<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="theme-color" content="#092343">
<title>محصّل الشريمي V1.0.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--nav:#092343;--nav2:#0d365d;--gold:#d88b22;--green:#10a86b;--blue:#2563eb;--red:#e5484d;--orange:#e98a18;--ink:#0b1736;--muted:#718096;--line:#e3eaf4;--bg:#f3f7fc;--card:#fff;--shadow:0 14px 34px rgba(10,35,67,.09)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#f9fbff,#eef4fb);font-family:Tajawal,Arial,sans-serif;color:var(--ink);min-height:100vh}button,input,select,textarea{font-family:inherit;font-size:17px}button{border:0;cursor:pointer}.hidden{display:none!important}.shell{min-height:100vh;display:grid;grid-template-rows:auto 1fr auto}.top{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,var(--nav),var(--nav2));color:#fff;padding:15px 18px;box-shadow:0 10px 28px rgba(8,31,58,.22)}.top-row{display:flex;align-items:center;justify-content:space-between;gap:12px;max-width:1180px;margin:auto}.brand{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:17px;background:linear-gradient(135deg,#f2c76a,#d88921);display:grid;place-items:center;font-size:27px;color:#10223e;box-shadow:0 8px 20px rgba(216,137,33,.25)}.brand h1{margin:0;font-size:25px;font-weight:900}.brand p{margin:2px 0 0;color:#c5d6ec;font-weight:700;font-size:13px}.top-actions{display:flex;gap:8px}.icon-btn{width:47px;height:47px;border-radius:15px;background:rgba(255,255,255,.12);color:#fff;display:grid;place-items:center;font-size:21px}.main{padding:18px;max-width:1180px;width:100%;margin:auto}.statusbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:14px}.sync{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:7px 12px;background:#e8f7ef;color:#08764a;font-weight:900;font-size:13px}.sync.warn{background:#fff4e5;color:#a14f08}.searchbox{background:#fff;border:1px solid var(--line);border-radius:20px;padding:10px 14px;box-shadow:var(--shadow);display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;margin-bottom:15px}.searchbox input{width:100%;border:0;outline:0;background:transparent;padding:7px}.filters{display:flex;gap:8px;overflow:auto;padding-bottom:10px}.chip{white-space:nowrap;border-radius:999px;padding:9px 14px;background:#fff;color:#41516b;border:1px solid var(--line);font-weight:900}.chip.active{background:var(--nav);color:#fff}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:15px}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px;box-shadow:var(--shadow)}.stat span{display:block;color:var(--muted);font-size:13px;font-weight:800}.stat b{display:block;font-size:23px;margin-top:4px}.shops{display:grid;grid-template-columns:repeat(2,minmax(320px,1fr));gap:13px}.shop{background:#fff;border:1px solid var(--line);border-radius:22px;padding:15px;box-shadow:var(--shadow);position:relative;overflow:hidden}.shop:before{content:"";position:absolute;right:0;top:0;bottom:0;width:7px;background:var(--green)}.shop.due:before{background:var(--red)}.shop.soon:before{background:var(--orange)}.shop-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.shop h3{margin:0;font-size:23px;font-weight:900}.tenant{color:#334155;font-weight:900;margin-top:3px}.badge{border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;background:#dcfce7;color:#166534}.badge.due{background:#fee2e2;color:#991b1b}.info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}.info div{background:#f8fbff;border:1px solid #e8eef6;border-radius:14px;padding:9px}.info span{display:block;color:var(--muted);font-size:12px;font-weight:800}.info b{display:block;margin-top:3px;font-size:16px}.shop-actions{display:grid;grid-template-columns:1.25fr 1fr 1fr 1fr;gap:8px}.btn{border-radius:14px;padding:12px 10px;font-weight:900}.btn.green{background:linear-gradient(135deg,#078f5b,#16b978);color:#fff}.btn.blue{background:#eaf2ff;color:#1d4ed8}.btn.purple{background:#f0eaff;color:#6d28d9}.btn.orange{background:#fff1df;color:#b45309}.empty{background:#fff;border:1px dashed #cbd5e1;border-radius:20px;padding:36px;text-align:center;color:#64748b;font-weight:900}.bottom{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);padding:10px max(12px,env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(3,1fr);gap:8px;z-index:18}.navbtn{background:#f4f7fb;color:#42516a;border-radius:16px;padding:10px;font-weight:900}.navbtn.active{background:var(--nav);color:#fff}.modal{position:fixed;inset:0;background:rgba(3,12,26,.58);display:none;align-items:center;justify-content:center;padding:18px;z-index:100}.modal.show{display:flex}.card{width:min(760px,100%);max-height:94vh;overflow:auto;background:#fff;border-radius:25px;padding:18px;box-shadow:0 30px 90px rgba(0,0,0,.28)}.card-head{display:flex;justify-content:space-between;align-items:center;gap:10px;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:13px}.card-head h2{margin:0;font-size:24px}.close{width:42px;height:42px;border-radius:13px;background:#fee2e2;color:#991b1b;font-weight:900}.form{display:grid;grid-template-columns:1fr 1fr;gap:11px}.field label{display:block;font-weight:900;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;border:1px solid #cdd8e7;border-radius:14px;padding:12px;outline:0;background:#fff}.wide{grid-column:1/-1}.notice{background:#f0f7ff;border:1px solid #cfe3ff;color:#24528d;border-radius:15px;padding:11px;font-weight:800}.preview{display:grid;gap:7px;margin-top:11px}.preview-row{display:flex;justify-content:space-between;gap:10px;padding:9px 11px;background:#f8fafc;border:1px solid #e5eaf1;border-radius:12px;font-weight:800}.savebar{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.savebar button{flex:1;min-width:145px}.login{min-height:100vh;display:grid;place-items:center;padding:20px;background:linear-gradient(135deg,#071a34,#0e426b)}.login-card{width:min(460px,100%);background:#fff;border-radius:28px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.3)}.login-logo{width:80px;height:80px;margin:auto;border-radius:25px;background:linear-gradient(135deg,#f2c76a,#d88921);display:grid;place-items:center;font-size:40px}.login h1{text-align:center;margin:14px 0 4px}.login p{text-align:center;color:var(--muted);font-weight:800}.login .field{margin-top:12px}.login-btn{width:100%;margin-top:15px;background:linear-gradient(135deg,#0b284a,#0f5a78);color:#fff;border-radius:16px;padding:14px;font-weight:900}.daily-list{display:grid;gap:9px}.daily-item{display:grid;grid-template-columns:1fr auto;gap:10px;background:#fff;border:1px solid var(--line);border-radius:15px;padding:11px}.daily-item b{display:block}.daily-item span{color:var(--muted);font-size:13px;font-weight:800}.gear-link{background:transparent;color:#1d4ed8;font-weight:900;padding:8px}.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(30px);background:#0b1736;color:white;padding:12px 18px;border-radius:15px;font-weight:900;opacity:0;pointer-events:none;transition:.2s;z-index:200}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:800px){.shops{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.shop-actions{grid-template-columns:1.35fr 1fr}.form{grid-template-columns:1fr}.wide{grid-column:auto}.brand h1{font-size:21px}.brand p{display:none}.main{padding:12px}.top{padding:12px}.shop{padding:14px}.info{grid-template-columns:1fr 1fr}}
@media print{body{background:#fff}.shell,.login,.modal,.toast{display:none!important}}
</style>
</head>
<body>
<section id="loginView" class="login"><div class="login-card"><div class="login-logo">🧾</div><h1>محصّل الشريمي</h1><p>تحصيل إيجارات المحلات وطباعة السند الحراري</p><div id="firstSetup" class="hidden"><div class="notice">أول تشغيل: أنشئ اسم المحصّل ورقم الدخول لهذا الجهاز.</div><div class="field"><label>اسم المحصّل</label><input id="setupName" placeholder="مثال: محمد"></div><div class="field"><label>رقم الدخول</label><input id="setupPin" type="password" inputmode="numeric" maxlength="8"></div><button class="login-btn" onclick="createFirstCollector()">حفظ وبدء الاستخدام</button></div><div id="loginForm"><div class="field"><label>المحصّل</label><select id="loginUser"></select></div><div class="field"><label>رقم الدخول</label><input id="loginPin" type="password" inputmode="numeric" maxlength="8" onkeydown="if(event.key==='Enter')login()"></div><button class="login-btn" onclick="login()">دخول</button><button class="gear-link" onclick="openCloudSettings()">⚙️ إعداد الربط مع البرنامج الرئيسي</button></div></div></section>
<section id="appView" class="shell hidden"><header class="top"><div class="top-row"><div class="brand"><div class="logo">🧾</div><div><h1>محصّل الشريمي</h1><p id="collectorName">جولة التحصيل</p></div></div><div class="top-actions"><button class="icon-btn" onclick="syncAll(true)">🔄</button><button class="icon-btn" onclick="openCloudSettings()">⚙️</button><button class="icon-btn" onclick="logout()">↩️</button></div></div></header><main class="main"><div class="statusbar"><div id="syncState" class="sync warn">● يعمل محلياً</div><div id="todayLabel" style="font-weight:900;color:#60708a"></div></div><div class="searchbox"><span>🔍</span><input id="search" placeholder="ابحث باسم المستأجر أو رقم المحل أو الجوال..." oninput="renderShops()"><button class="chip" onclick="document.getElementById('search').value='';renderShops()">مسح</button></div><div class="filters"><button class="chip active" data-filter="all" onclick="setFilter('all',this)">كل المحلات</button><button class="chip" data-filter="due" onclick="setFilter('due',this)">المتأخرة</button><button class="chip" data-filter="paid" onclick="setFilter('paid',this)">بدون مستحق</button><button class="chip" data-filter="visited" onclick="setFilter('visited',this)">تمت زيارتها</button></div><div id="stats" class="stats"></div><div id="shops" class="shops"></div><section id="dailyView" class="hidden"><div class="card" style="width:100%;max-height:none"><div class="card-head"><h2>إغلاق جولة اليوم</h2><button class="btn blue" onclick="printDailySummary()">طباعة الملخص</button></div><div id="dailySummary"></div><div id="dailyList" class="daily-list"></div></div></section></main><nav class="bottom"><button id="navShops" class="navbtn active" onclick="showTab('shops')">🏪 المحلات</button><button id="navDaily" class="navbtn" onclick="showTab('daily')">📊 جولة اليوم</button><button class="navbtn" onclick="syncAll(true)">🔄 مزامنة</button></nav></section>
<div id="modal" class="modal"><div class="card"><div class="card-head"><h2 id="modalTitle"></h2><button class="close" onclick="closeModal()">×</button></div><div id="modalBody"></div></div></div><div id="toast" class="toast"></div>
<script>
const KEY_USERS='hasan_collector_users_v1',KEY_SESSION='hasan_collector_session_v1',KEY_QUEUE='hasan_collector_receipts_v1',KEY_VISITS='hasan_collector_visits_v1',KEY_CONFIG='hasan_collector_cloud_config_v1',KEY_CLOUD_SHOPS='hasan_collector_cloud_shops_v1',KEY_CLOUD_INSTALLMENTS='hasan_collector_cloud_installments_v1';
const PROP_CENTERS_KEY='hasan_property_centers_v1',PROP_UNITS_KEY='hasan_property_units_v1',LS='hasan_erp_v2_';
const channel=('BroadcastChannel' in window)?new BroadcastChannel('hasan_collector_bridge_v1'):null;let shops=[],installments=[],filter='all',currentUser=null,saving=false;
function jget(k,f=[]){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(f))}catch(e){return f}}function jset(k,v){localStorage.setItem(k,JSON.stringify(v))}function num(v){return Number(v||0)}function money(v){return num(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}function today(){return new Date().toISOString().slice(0,10)}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function toast(t){const x=document.getElementById('toast');x.textContent=t;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),2200)}
function config(){return jget(KEY_CONFIG,{url:'',anonKey:'',tenantId:'',workspaceKey:'',paper:'58'})}function cloudReady(){const c=config();return !!(c.url&&c.anonKey&&c.tenantId&&c.workspaceKey)}function headers(extra={}){const c=config();return {'apikey':c.anonKey,'Authorization':'Bearer '+c.anonKey,'Content-Type':'application/json','x-workspace-key':c.workspaceKey,...extra}}async function request(path,opts={}){const c=config();const r=await fetch(c.url.replace(/\/$/,'')+path,{...opts,headers:headers(opts.headers||{})});if(!r.ok)throw new Error((await r.text())||('HTTP '+r.status));const t=await r.text();return t?JSON.parse(t):null}
function init(){document.getElementById('todayLabel').textContent=new Date().toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});const users=jget(KEY_USERS,[]),session=jget(KEY_SESSION,null);if(!users.length){document.getElementById('firstSetup').classList.remove('hidden');document.getElementById('loginForm').classList.add('hidden')}else{document.getElementById('loginUser').innerHTML=users.filter(x=>x.active!==false).map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('');if(session){currentUser=users.find(x=>String(x.id)===String(session.userId));if(currentUser)openApp()}}}
function createFirstCollector(){const name=document.getElementById('setupName').value.trim(),pin=document.getElementById('setupPin').value.trim();if(!name||pin.length<4)return alert('أدخل اسم المحصّل ورقم دخول من 4 أرقام على الأقل');const u={id:'u_'+Date.now(),name,pin,active:true};jset(KEY_USERS,[u]);jset(KEY_SESSION,{userId:u.id});currentUser=u;openApp()}
function login(){const users=jget(KEY_USERS,[]),id=document.getElementById('loginUser').value,pin=document.getElementById('loginPin').value;const u=users.find(x=>String(x.id)===String(id)&&String(x.pin)===String(pin)&&x.active!==false);if(!u)return alert('اسم المحصّل أو رقم الدخول غير صحيح');currentUser=u;jset(KEY_SESSION,{userId:u.id});openApp()}function logout(){jset(KEY_SESSION,null);location.reload()}
async function openApp(){document.getElementById('loginView').classList.add('hidden');document.getElementById('appView').classList.remove('hidden');document.getElementById('collectorName').textContent='المحصّل: '+currentUser.name;await syncAll(false)}
function localData(){const centers=jget(PROP_CENTERS_KEY,[]),units=jget(PROP_UNITS_KEY,[]).filter(u=>u.type==='محل'),cm=Object.fromEntries(centers.map(c=>[String(c.id),c]));return {shops:units.map(u=>({...u,unit_id:String(u.id),center_name:cm[String(u.center_id)]?.name||'',tenant_name:u.tenant||'',phone:u.phone||'',due:num(u.due),rent:num(u.rent)})),installments:jget(LS+'rent_installments',[]).filter(r=>units.some(u=>String(u.id)===String(r.unit_id))).map(r=>({...r,installment_id:String(r.id),due_date:r['تاريخ الاستحقاق'],amount:num(r['المبلغ']),paid:num(r['المدفوع']),remaining:Math.max(0,num(r['المبلغ'])-num(r['المدفوع'])),status:r['الحالة'],installment_no:r['رقم الدفعة'],period_from:r['الفترة من'],period_to:r['الفترة إلى']}))}}
async function fetchCloud(){const c=config();const s=await request(`/rest/v1/shuraimi_shops?tenant_id=eq.${encodeURIComponent(c.tenantId)}&select=*&order=unit_no.asc`),i=await request(`/rest/v1/shuraimi_rent_installments?tenant_id=eq.${encodeURIComponent(c.tenantId)}&select=*&order=due_date.asc`);jset(KEY_CLOUD_SHOPS,s||[]);jset(KEY_CLOUD_INSTALLMENTS,i||[]);return {shops:s||[],installments:i||[]}}
async function pushPending(){if(!cloudReady())return;const c=config(),rows=jget(KEY_QUEUE,[]);for(const r of rows.filter(x=>x.status==='pending_cloud')){try{await request('/rest/v1/shuraimi_collector_receipts?on_conflict=tenant_id,receipt_no',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify([{tenant_id:c.tenantId,receipt_no:r.receipt_no,unit_id:String(r.unit_id),contract_id:String(r.contract_id||''),collector_id:String(r.collector_id||''),collector_name:r.collector_name,tenant_name:r.tenant_name,amount:num(r.amount),payment_method:r.payment_method,received_at:r.received_at,note:r.note||'',allocation:r.allocation||[],balance_after:num(r.balance_after),status:'pending',device_id:r.device_id||deviceId()}])});r.status='sent_cloud';r.sent_at=new Date().toISOString()}catch(e){r.last_error=e.message}}jset(KEY_QUEUE,rows)}
async function syncAll(manual=true){setSync('جاري المزامنة...',false);try{await pushPending();let data;if(cloudReady())data=await fetchCloud();else data=localData();shops=data.shops||[];installments=data.installments||[];setSync(cloudReady()?'متصل بالبرنامج الرئيسي':'يعمل محلياً',cloudReady());renderShops();renderDaily();if(manual)toast('اكتملت المزامنة')}catch(e){const cached={shops:jget(KEY_CLOUD_SHOPS,[]),installments:jget(KEY_CLOUD_INSTALLMENTS,[])};if(cached.shops.length){shops=cached.shops;installments=cached.installments;renderShops()}else{const d=localData();shops=d.shops;installments=d.installments;renderShops()}setSync('تعذر الاتصال — وضع دون إنترنت',false);if(manual)alert('تعذرت المزامنة: '+e.message)}}function setSync(t,ok){const e=document.getElementById('syncState');e.textContent='● '+t;e.className='sync '+(ok?'':'warn')}
function visitRows(){return jget(KEY_VISITS,[])}function receiptRows(){return jget(KEY_QUEUE,[])}function isVisited(id){return visitRows().some(v=>String(v.unit_id)===String(id)&&v.date===today())}function setFilter(v,btn){filter=v;document.querySelectorAll('.filters .chip').forEach(x=>x.classList.remove('active'));btn.classList.add('active');renderShops()}
function shopDue(s){if(s.due!==undefined)return num(s.due);return installments.filter(i=>String(i.unit_id)===String(s.unit_id||s.id)&&!['مدفوع','ملغاة'].includes(i.status)).reduce((a,i)=>a+num(i.remaining),0)}
function renderShops(){const q=document.getElementById('search').value.trim().toLowerCase();let rows=shops.filter(s=>{const text=[s.unit_no,s.tenant_name||s.tenant,s.phone,s.center_name].join(' ').toLowerCase(),due=shopDue(s);if(q&&!text.includes(q))return false;if(filter==='due'&&due<=0)return false;if(filter==='paid'&&due>0)return false;if(filter==='visited'&&!isVisited(s.unit_id||s.id))return false;return true});const total=shops.reduce((a,s)=>a+shopDue(s),0),todayR=receiptRows().filter(r=>String(r.received_at).slice(0,10)===today()&&r.collector_id===currentUser.id);document.getElementById('stats').innerHTML=`<div class="stat"><span>المحلات</span><b>${shops.length}</b></div><div class="stat"><span>المستحق</span><b class="${total>0?'red':''}">${money(total)}</b></div><div class="stat"><span>سندات اليوم</span><b>${todayR.length}</b></div><div class="stat"><span>تحصيل اليوم</span><b class="green">${money(todayR.reduce((a,r)=>a+num(r.amount),0))}</b></div>`;document.getElementById('shops').innerHTML=rows.map(card).join('')||'<div class="empty">لا توجد محلات مطابقة للبحث أو لم تصل بيانات المحلات من البرنامج الرئيسي بعد.</div>'}
function card(s){const id=s.unit_id||s.id,due=shopDue(s),cls=due>0?'due':'',tenant=s.tenant_name||s.tenant||'بدون مستأجر';return `<article class="shop ${cls}"><div class="shop-head"><div><h3>🏪 ${esc(s.unit_no||'-')}</h3><div class="tenant">${esc(tenant)}</div><div style="color:#718096;font-weight:800;font-size:13px">${esc(s.center_name||'المحلات التجارية')}</div></div><span class="badge ${due>0?'due':''}">${due>0?'مستحق':'مسدد'}</span></div><div class="info"><div><span>المستحق الحالي</span><b class="${due>0?'red':''}">${money(due)} ر.س</b></div><div><span>آخر سداد</span><b>${esc(s.last_payment||'-')}</b></div><div><span>الإيجار</span><b>${money(s.rent||0)} ر.س</b></div><div><span>الجوال</span><b>${esc(s.phone||'-')}</b></div></div><div class="shop-actions"><button class="btn green" onclick="openReceipt('${id}')">💵 سداد</button><button class="btn blue" onclick="openStatement('${id}')">📄 كشف</button><button class="btn purple" onclick="printLastReceipt('${id}')">🖨️ سند</button><button class="btn orange" onclick="markVisit('${id}')">📍 لم يسدد</button></div></article>`}
function getShop(id){return shops.find(s=>String(s.unit_id||s.id)===String(id))}function getInstallments(id){return installments.filter(i=>String(i.unit_id)===String(id)&&!['مدفوع','ملغاة'].includes(i.status)).sort((a,b)=>String(a.due_date||'').localeCompare(String(b.due_date||'')))}function allocation(id,amount){let rem=num(amount),arr=[];for(const i of getInstallments(id)){if(rem<=0)break;const need=num(i.remaining);if(need<=0)continue;const pay=Math.min(rem,need);arr.push({installment_id:i.installment_id||i.id,installment_no:i.installment_no,due_date:i.due_date,amount:pay});rem-=pay}return {rows:arr,extra:rem}}
function openReceipt(id){const s=getShop(id),due=shopDue(s);document.getElementById('modalTitle').textContent='سند قبض — محل '+(s.unit_no||'');document.getElementById('modalBody').innerHTML=`<div class="notice"><b>${esc(s.tenant_name||s.tenant||'-')}</b><br>المستحق الحالي: <b>${money(due)} ر.س</b></div><div class="form" style="margin-top:12px"><div class="field"><label>المبلغ المستلم</label><input id="rAmount" type="number" step="0.01" value="${due||s.rent||0}" oninput="previewReceipt('${id}')"></div><div class="field"><label>طريقة الدفع</label><select id="rMethod"><option>نقدي</option><option>تحويل</option><option>شبكة</option><option>شيك</option></select></div><div class="field"><label>التاريخ</label><input id="rDate" type="date" value="${today()}"></div><div class="field"><label>مقاس الطابعة</label><select id="rPaper"><option value="58" ${config().paper==='58'?'selected':''}>58mm</option><option value="80" ${config().paper==='80'?'selected':''}>80mm</option></select></div><div class="field wide"><label>ملاحظة</label><input id="rNote" placeholder="اختياري"></div></div><div id="rPreview" class="preview"></div><div class="savebar"><button id="saveReceiptBtn" class="btn green" onclick="saveReceipt('${id}')">حفظ وطباعة السند</button><button class="btn blue" onclick="closeModal()">إلغاء</button></div>`;document.getElementById('modal').classList.add('show');previewReceipt(id)}
function previewReceipt(id){const s=getShop(id),amount=num(document.getElementById('rAmount')?.value),a=allocation(id,amount),after=Math.max(0,shopDue(s)-amount);document.getElementById('rPreview').innerHTML=`<div class="preview-row"><span>المبلغ المستلم</span><b>${money(amount)} ر.س</b></div><div class="preview-row"><span>سيغطي من أقدم الدفعات</span><b>${a.rows.length} دفعة</b></div><div class="preview-row"><span>الرصيد المتوقع بعد السداد</span><b>${money(after)} ر.س</b></div>${a.extra>0?`<div class="notice">يوجد مبلغ مقدم قدره ${money(a.extra)} ر.س بعد إقفال جميع الدفعات المفتوحة.</div>`:''}`}
function deviceId(){let id=localStorage.getItem('hasan_collector_device_id');if(!id){id='d_'+Date.now()+'_'+Math.random().toString(36).slice(2);localStorage.setItem('hasan_collector_device_id',id)}return id}function receiptNo(){const d=new Date(),p=x=>String(x).padStart(2,'0');return `CR-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}-${Math.random().toString(36).slice(2,5).toUpperCase()}`}
function applyLocalReceipt(r){const units=jget(PROP_UNITS_KEY,[]),ui=units.findIndex(u=>String(u.id)===String(r.unit_id));if(ui<0)return false;let ins=jget(LS+'rent_installments',[]),left=num(r.amount);ins=ins.map(i=>{if(String(i.unit_id)!==String(r.unit_id)||['مدفوع','ملغاة'].includes(i['الحالة'])||left<=0)return i;const need=Math.max(0,num(i['المبلغ'])-num(i['المدفوع'])),pay=Math.min(left,need);left-=pay;const paid=num(i['المدفوع'])+pay,remain=Math.max(0,num(i['المبلغ'])-paid);return {...i,'المدفوع':paid,'المتبقي':remain,'الحالة':remain<=0?'مدفوع':'جزئي','تاريخ السداد':r.received_at.slice(0,10),'آخر سند محصل':r.receipt_no}});jset(LS+'rent_installments',ins);const center=jget(PROP_CENTERS_KEY,[]).find(c=>String(c.id)===String(units[ui].center_id))||{};const p=jget(LS+'payments',[]);p.unshift({id:Date.now()+1,created:new Date().toISOString(),receipt_no:r.receipt_no,'رقم السند':r.receipt_no,'مركز التكلفة':center.name||'','الوحدة':units[ui].unit_no,'المستأجر':units[ui].tenant||'','المبلغ':r.amount,'طريقة الدفع':r.payment_method,'تاريخ السداد':r.received_at.slice(0,10),'البيان':r.note||'تحصيل من تطبيق المحصل',unit_id:r.unit_id,center_id:units[ui].center_id,collector_name:r.collector_name,source_app:'collector'});jset(LS+'payments',p);const f=jget(LS+'finance',[]);f.unshift({id:Date.now()+2,created:new Date().toISOString(),receipt_no:r.receipt_no,'نوع العملية':'سند قبض','رقم السند':r.receipt_no,'التاريخ':r.received_at.slice(0,10),'المستلم منه':units[ui].tenant||'','نوع السند':'إيراد إيجار','مركز التكلفة':center.name||'المحلات التجارية','طريقة الدفع':r.payment_method,'الحساب':r.payment_method==='نقدي'?'الصندوق':'البنك','المبلغ':r.amount,'البيان':r.note||'تحصيل من تطبيق المحصل','حالة الاعتماد':'معتمد','المحصّل':r.collector_name,unit_id:r.unit_id,source_app:'collector'});jset(LS+'finance',f);const due=ins.filter(i=>String(i.unit_id)===String(r.unit_id)&&!['مدفوع','ملغاة'].includes(i['الحالة'])&&String(i['تاريخ الاستحقاق']||'')<=today()).reduce((a,i)=>a+Math.max(0,num(i['المبلغ'])-num(i['المدفوع'])),0);units[ui]={...units[ui],due,last_payment:r.received_at.slice(0,10)};jset(PROP_UNITS_KEY,units);return true}
async function saveReceipt(id){if(saving)return;const s=getShop(id),amount=num(document.getElementById('rAmount').value);if(amount<=0)return alert('أدخل مبلغ السداد');saving=true;document.getElementById('saveReceiptBtn').disabled=true;const a=allocation(id,amount),r={id:'r_'+Date.now()+'_'+Math.random().toString(36).slice(2),receipt_no:receiptNo(),unit_id:String(id),contract_id:String(s.contract_id||''),collector_id:currentUser.id,collector_name:currentUser.name,tenant_name:s.tenant_name||s.tenant||'',amount,payment_method:document.getElementById('rMethod').value,received_at:document.getElementById('rDate').value+'T'+new Date().toTimeString().slice(0,8),note:document.getElementById('rNote').value,allocation:a.rows,balance_after:Math.max(0,shopDue(s)-amount),status:cloudReady()?'pending_cloud':'pending_local',device_id:deviceId(),created_at:new Date().toISOString()};const rows=jget(KEY_QUEUE,[]);rows.unshift(r);jset(KEY_QUEUE,rows);const localApplied=applyLocalReceipt(r);if(localApplied){r.status=cloudReady()?'pending_cloud':'posted';r.posted_at=new Date().toISOString();jset(KEY_QUEUE,rows)}channel?.postMessage({type:'collector_receipt_saved',receipt_no:r.receipt_no});const cfg=config();cfg.paper=document.getElementById('rPaper').value;jset(KEY_CONFIG,cfg);printReceipt(r,s,cfg.paper);closeModal();toast('تم حفظ سند القبض بنجاح');saving=false;await syncAll(false)}
function markVisit(id){const s=getShop(id);document.getElementById('modalTitle').textContent='تعذر التحصيل — محل '+s.unit_no;document.getElementById('modalBody').innerHTML=`<div class="form"><div class="field wide"><label>السبب</label><select id="vReason"><option>المحل مغلق</option><option>المستأجر غير موجود</option><option>وعد بالسداد</option><option>رفض السداد</option><option>اعتراض على المبلغ</option><option>سبب آخر</option></select></div><div class="field wide"><label>ملاحظة</label><textarea id="vNote"></textarea></div></div><div class="savebar"><button class="btn orange" onclick="saveVisit('${id}')">حفظ الزيارة</button><button class="btn blue" onclick="closeModal()">إلغاء</button></div>`;document.getElementById('modal').classList.add('show')}
async function saveVisit(id){const s=getShop(id),v={id:'v_'+Date.now(),unit_id:String(id),unit_no:s.unit_no,tenant_name:s.tenant_name||s.tenant||'',collector_id:currentUser.id,collector_name:currentUser.name,date:today(),reason:document.getElementById('vReason').value,note:document.getElementById('vNote').value,created_at:new Date().toISOString()};const rows=jget(KEY_VISITS,[]);rows.unshift(v);jset(KEY_VISITS,rows);if(cloudReady()){try{const c=config();await request('/rest/v1/shuraimi_collection_visits',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify([{tenant_id:c.tenantId,...v}])})}catch(e){v.last_error=e.message;jset(KEY_VISITS,rows)}}closeModal();renderShops();toast('تم تسجيل الزيارة')}
function openStatement(id){const s=getShop(id),ins=getInstallments(id);document.getElementById('modalTitle').textContent='كشف حساب — محل '+s.unit_no;document.getElementById('modalBody').innerHTML=`<div class="notice">${esc(s.tenant_name||s.tenant||'-')} — المتبقي ${money(shopDue(s))} ر.س</div><div class="preview">${ins.map(i=>`<div class="preview-row"><span>${esc(i.due_date||'-')} — دفعة ${esc(i.installment_no||'-')}</span><b>${money(i.remaining)} ر.س</b></div>`).join('')||'<div class="empty">لا توجد دفعات مفتوحة</div>'}</div><div class="savebar"><button class="btn blue" onclick="printStatement('${id}')">طباعة الكشف</button><button class="btn green" onclick="openReceipt('${id}')">تسجيل سداد</button></div>`;document.getElementById('modal').classList.add('show')}
function printReceipt(r,s,paper='58'){const width=paper==='80'?'80mm':'58mm',w=window.open('','_blank','width=420,height=700');w.document.write(`<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><title>${r.receipt_no}</title><style>@page{size:${width} auto;margin:2.5mm}*{box-sizing:border-box}body{font-family:Arial,Tahoma,sans-serif;width:${width};margin:0;padding:2mm;color:#000;font-size:${paper==='80'?'13px':'11px'};line-height:1.55}.center{text-align:center}.brand{font-weight:bold;font-size:${paper==='80'?'17px':'14px'}}.line{border-top:1px dashed #000;margin:6px 0}.row{display:flex;justify-content:space-between;gap:5px}.amount{font-size:${paper==='80'?'22px':'18px'};font-weight:bold;border:2px solid #000;padding:5px;text-align:center;margin:7px 0}.sign{margin-top:20px;text-align:center;border-top:1px solid #000;padding-top:5px}.no-print{display:block;text-align:center;margin:10px}@media print{.no-print{display:none}}</style></head><body><button class="no-print" onclick="print()">طباعة</button><div class="center brand">مؤسسة حسن محمد الشريمي<br>سند قبض إيجار</div><div class="line"></div><div class="row"><span>رقم السند</span><b>${esc(r.receipt_no)}</b></div><div class="row"><span>التاريخ</span><b>${esc(r.received_at.replace('T',' '))}</b></div><div class="row"><span>المحل</span><b>${esc(s.unit_no||'-')}</b></div><div class="row"><span>المستأجر</span><b>${esc(s.tenant_name||s.tenant||'-')}</b></div><div class="amount">${money(r.amount)} ر.س</div><div class="row"><span>طريقة الدفع</span><b>${esc(r.payment_method)}</b></div><div class="row"><span>المتبقي بعد السداد</span><b>${money(r.balance_after)} ر.س</b></div><div class="row"><span>المحصّل</span><b>${esc(r.collector_name)}</b></div>${r.note?`<div class="line"></div><div>${esc(r.note)}</div>`:''}<div class="line"></div><div class="center">تم تسجيل السند إلكترونياً في نظام الشريمي</div><div class="sign">توقيع المستلم</div></body></html>`);w.document.close();setTimeout(()=>w.print(),250)}
function printLastReceipt(id){const s=getShop(id),r=receiptRows().find(x=>String(x.unit_id)===String(id));if(!r)return alert('لا يوجد سند مسجل لهذا المحل في هذا الجهاز');printReceipt(r,s,config().paper||'58')}
function printStatement(id){const s=getShop(id),ins=getInstallments(id),w=window.open('','_blank','width=500,height=750');w.document.write(`<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><style>@page{size:80mm auto;margin:3mm}body{font-family:Arial;width:76mm;margin:0;font-size:12px}h2{text-align:center}.row{display:flex;justify-content:space-between;border-bottom:1px dashed #777;padding:6px 0}</style></head><body><h2>كشف حساب إيجار</h2><div class="row"><span>المحل</span><b>${esc(s.unit_no)}</b></div><div class="row"><span>المستأجر</span><b>${esc(s.tenant_name||s.tenant||'-')}</b></div>${ins.map(i=>`<div class="row"><span>${esc(i.due_date||'-')}</span><b>${money(i.remaining)}</b></div>`).join('')}<div class="row"><strong>الإجمالي</strong><strong>${money(shopDue(s))} ر.س</strong></div></body></html>`);w.document.close();setTimeout(()=>w.print(),200)}
function renderDaily(){const rows=receiptRows().filter(r=>String(r.received_at).slice(0,10)===today()&&r.collector_id===currentUser?.id),vis=visitRows().filter(v=>v.date===today()&&v.collector_id===currentUser?.id),sum=arr=>arr.reduce((a,r)=>a+num(r.amount),0);document.getElementById('dailySummary').innerHTML=`<div class="stats"><div class="stat"><span>السندات</span><b>${rows.length}</b></div><div class="stat"><span>الإجمالي</span><b>${money(sum(rows))}</b></div><div class="stat"><span>النقدي</span><b>${money(sum(rows.filter(r=>r.payment_method==='نقدي')))}</b></div><div class="stat"><span>زيارات بدون تحصيل</span><b>${vis.length}</b></div></div>`;document.getElementById('dailyList').innerHTML=[...rows.map(r=>`<div class="daily-item"><div><b>${esc(r.receipt_no)} — ${esc(r.tenant_name)}</b><span>${esc(r.payment_method)} • ${esc(r.received_at.replace('T',' '))}</span></div><strong>${money(r.amount)} ر.س</strong></div>`),...vis.map(v=>`<div class="daily-item"><div><b>زيارة — ${esc(v.unit_no)} ${esc(v.tenant_name)}</b><span>${esc(v.reason)} ${v.note?'• '+esc(v.note):''}</span></div><strong>بدون تحصيل</strong></div>`)].join('')||'<div class="empty">لا توجد عمليات في جولة اليوم</div>'}
function showTab(t){const daily=t==='daily';document.getElementById('shops').classList.toggle('hidden',daily);document.getElementById('stats').classList.toggle('hidden',daily);document.querySelector('.searchbox').classList.toggle('hidden',daily);document.querySelector('.filters').classList.toggle('hidden',daily);document.getElementById('dailyView').classList.toggle('hidden',!daily);document.getElementById('navShops').classList.toggle('active',!daily);document.getElementById('navDaily').classList.toggle('active',daily);if(daily)renderDaily()}
function printDailySummary(){window.print()}
function openCloudSettings(){const c=config();document.getElementById('modalTitle').textContent='ربط البرنامج الرئيسي والطابعة';document.getElementById('modalBody').innerHTML=`<div class="notice">استخدم نفس البيانات الموجودة في شاشة «إعداد ربط تطبيق المحصّل» داخل البرنامج الرئيسي.</div><div class="form" style="margin-top:12px"><div class="field wide"><label>رابط Supabase</label><input id="cUrl" value="${esc(c.url||'')}"></div><div class="field wide"><label>Anon Key</label><input id="cKey" type="password" value="${esc(c.anonKey||'')}"></div><div class="field"><label>Tenant ID</label><input id="cTenant" value="${esc(c.tenantId||'')}"></div><div class="field"><label>Workspace Key</label><input id="cWorkspace" type="password" value="${esc(c.workspaceKey||'')}"></div><div class="field"><label>مقاس الطابعة الافتراضي</label><select id="cPaper"><option value="58" ${c.paper==='58'?'selected':''}>58mm</option><option value="80" ${c.paper==='80'?'selected':''}>80mm</option></select></div></div><div class="savebar"><button class="btn green" onclick="saveCloudSettings()">حفظ واختبار</button><button class="btn blue" onclick="closeModal()">إلغاء</button></div>`;document.getElementById('modal').classList.add('show')}
async function saveCloudSettings(){const c={url:document.getElementById('cUrl').value.trim(),anonKey:document.getElementById('cKey').value.trim(),tenantId:document.getElementById('cTenant').value.trim(),workspaceKey:document.getElementById('cWorkspace').value.trim(),paper:document.getElementById('cPaper').value};jset(KEY_CONFIG,c);try{if(cloudReady())await request('/rest/v1/shuraimi_shops?select=unit_id&limit=1');closeModal();await syncAll(true)}catch(e){alert('تم حفظ الإعدادات، لكن فشل الاختبار: '+e.message)}}function closeModal(){document.getElementById('modal').classList.remove('show')}
init();
</script>
</body></html>
